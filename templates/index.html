<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Management</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Product Inventory</h1>

<h2>Add Category</h2>
<form id="categoryForm">
  <input type="text" id="categoryName" placeholder="Category Name" required>
  <button type="submit">Add Category</button>
</form>

<table id="categoryTable">
  <thead>
    <tr><th>ID</th><th>Name</th></tr>
  </thead>
  <tbody></tbody>
</table>

<h2>Add Supplier</h2>
<form id="supplierForm">
  <input type="text" id="supplierName" placeholder="Supplier Name" required>
  <input type="text" id="supplierContact" placeholder="Contact (email/phone)">
  <button type="submit">Add Supplier</button>
</form>

<table id="supplierTable">
  <thead>
    <tr><th>ID</th><th>Name</th><th>Contact</th></tr>
  </thead>
  <tbody></tbody>
</table>

<h2>Add Product</h2>
<form id="productForm">
  <input type="text" id="name" placeholder="Product Name" required>
  <input type="text" id="sku" placeholder="SKU" required>
  <input type="number" id="price" placeholder="Price" step="0.01" required>
  <input type="number" id="quantity" placeholder="Quantity" required>
  <input type="number" id="category_id" placeholder="Category ID">
  <input type="text" id="description" placeholder="Description">
  <input type="number" id="warranty_months" placeholder="Warranty (months)">
  <input type="text" id="supplier_ids" placeholder="Supplier IDs (comma separated, e.g. 1,2)">
  <button type="submit">Add Product</button>
</form>

<table id="productTable">
  <thead>
    <tr><th>ID</th><th>Name</th><th>SKU</th><th>Price</th><th>Qty</th><th>Category</th><th>Actions</th></tr>
  </thead>
  <tbody></tbody>
</table>

<script src="/static/script.js"></script>
</body>
</html>
